# 1. データベースへの接続設定
# 3306はデフォルトのポート番号、家計簿用のDB名を「kakeibo_db」と仮定します
spring.datasource.url=jdbc:mysql://localhost:3306/kakeibo_db?serverTimezone=Asia/Tokyo&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# 2. JPA/Hibernateの設定
# update: Entityクラスの変更に合わせて、自動でテーブルを作成・更新します
spring.jpa.hibernate.ddl-auto=update

# 3. ログの設定（デバッグに便利）
# 実行されたSQLをコンソールに表示します
spring.jpa.show-sql=true
# SQLを読みやすく整形して表示します
spring.jpa.properties.hibernate.format_sql=true